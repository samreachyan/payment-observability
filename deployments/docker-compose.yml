  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=grafana
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    networks:
      - payment-network

  chroma:
    image: ghcr.io/chroma-core/chroma:0.4.24
    container_name: chroma
    depends_on:
      - alloy
    ports:
      - 8000:8000
    environment:
      - CHROMA_OTEL_COLLECTION_ENDPOINT=http://grafana-agent:4317
      - CHROMA_OTEL_SERVICE_NAME=chroma
      - CHROMA_OTEL_GRANULARITY=all
      - ANONYMIZED_TELEMETRY=False
    networks:
      - payment-network

  prometheus:
    image: prom/prometheus:v2.45.0
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--enable-feature=otlp-write-receiver"
      - "--enable-feature=exemplar-storage"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml
    networks:
      - payment-network

  loki:
    image: grafana/loki:3.5
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - payment-network

  tempo:
    image: grafana/tempo:2.7.2
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml
    ports:
      - "3110:3110"     # Tempo
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
#      - "9411:9411"     # Zipkin
    networks:
      - payment-network

  grafana:
    image: grafana/grafana:12.0.1
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin1
#      - GF_DATABASE_USER=user
#      - GF_DATABASE_PASSWORD=pass
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
#      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
#      - ./grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - loki
      - tempo
      - prometheus
    restart: unless-stopped
    networks:
      - payment-network

  alloy:
    image: docker.io/grafana/alloy:v1.0.0
    container_name: alloy
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/data-alloy"
      - "--disable-reporting"
      - "/etc/alloy/config.alloy"
    depends_on:
      - loki
      - prometheus
      - tempo
    hostname: ${HOST_NAME:-localhost}
    environment:
      - ENVIRONMENT=dev
      - LOKI_URL=http://loki:3100/loki/api/v1/push
      - PROMETHEUS_URL=http://prometheus:9090/api/v1/write
      - TEMPO_URL=http://tempo:4317
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock
      - ./alloy-data:/data-alloy
    restart: unless-stopped
    networks:
      - payment-network

  # Jaeger
#  jaeger-all-in-one:
#    image: jaegertracing/all-in-one:1.69.0
#    restart: always
#    ports:
#      - "16686:16686"
#      - "14268"
#      - "14250"
#    networks:
#      - payment-network

  # Zipkin
  zipkin:
    image: openzipkin/zipkin:latest
    restart: always
    environment:
      - STORAGE_TYPE=mem
    ports:
      - "9411:9411"
    networks:
      - payment-network

volumes:
  db_data:
  grafana-data:
  es_data:
  alloy-data:
  payment_logs:

networks:
  payment-network:
    driver: bridge
