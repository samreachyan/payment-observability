server:
  port: 8080

spring:
  application:
    name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/grafana}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  zipkin:
    base-url: ${SPRING_ZIPKIN_BASEURL:http://localhost:9411}

logging:
#  file:
#    name: ${LOGGING_PATH:/Users/samreachyan/app_logs/score-service.log}
  pattern:
    correlation: '[%X{traceId:-}-%X{spanId:-}] : '

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, metrics

    metrics:
      tags:
        application: ${spring.application.name}
      distribution:
        percentiles-histogram:
          all: true
          http.server.requests: true

    opentelemetry:
      resource-attributes:
        application: ${spring.application.name}
        "service.name": ${spring.application.name}
    tracing:
      sampling:
        probability: 1.0
    otlp:
      metrics:
        export:
          url: ${OTLP_METRICS_URL:http://localhost:4318/v1/metrics}
          step: 10s
      tracing:
        endpoint: ${OTLP_TRACES_URL:http://localhost:4318/v1/traces}
    prometheus:
      metrics:
        export:
          step: 5s
    endpoint:
      health:
        probes:
          enabled: true
        show-details: always
        show-components: always
    export:
      prometheus:
        enabled: true
