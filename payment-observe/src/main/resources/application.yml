server:
  port: 8080

spring:
  application:
    name: payment-observe
  datasource:
    url: jdbc:postgresql://localhost:5432/paymentdb
    username: user
    password: pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sleuth:
    otel:
      exporter:
        otlp:
          endpoint: http://tempo:4318
      tracing:
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    base-url: http://zipkin:9411
    enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.sakcode.paymentobserve.controller: DEBUG
    com.sakcode.paymentobserve.service: INFO
    com.sakcode.paymentobserve.repository: WARN
